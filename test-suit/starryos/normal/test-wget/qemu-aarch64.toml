args = [
    "-nographic", "-cpu", "cortex-a53",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/target/rootfs/rootfs-aarch64-alpine.img",
    "-device", "virtio-net-pci,netdev=net0",
    "-netdev", "user,id=net0",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = "wget -T 60 https://www.baidu.com -O /dev/null && echo 'TEST PASSED' || echo 'TEST FAILED'"
success_regex = ["(?m)^TEST PASSED\\s*$"]
fail_regex = ['(?i)\bpanic(?:ked)?\b', '(?m)^TEST FAILED']
timeout = 120
