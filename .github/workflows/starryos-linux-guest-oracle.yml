# Optional reference workflow: tools for Linux guest oracle (qemu-system + real kernel).
# Anchor: Alpine Linux 3.23.3 / Linux 6.18 LTS — docs/starryos-linux-guest-oracle-pin.md
#
# Default job only installs qemu-system-riscv64. To run verify-oracle-all on guest track in CI,
# add steps to fetch/cache a riscv64 Image, set STARRY_LINUX_GUEST_IMAGE, then:
#   CC=riscv64-linux-gnu-gcc test-suit/starryos/scripts/build-probes.sh
#   VERIFY_ORACLE_TRACK=guest-alpine323 VERIFY_STRICT=1 \
#     test-suit/starryos/scripts/run-diff-probes.sh verify-oracle-all
name: starryos-linux-guest-oracle

on:
  workflow_dispatch:

jobs:
  guest-oracle-tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install qemu-system-riscv64
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-misc
          qemu-system-riscv64 --version | head -1

      - name: Document guest oracle usage
        run: |
          echo "Local: export STARRY_LINUX_GUEST_IMAGE=/path/to/riscv64/Image"
          echo "  test-suit/starryos/scripts/run-diff-probes.sh oracle-guest write_stdout"
          echo "  VERIFY_ORACLE_TRACK=guest-alpine323 test-suit/starryos/scripts/run-diff-probes.sh verify-oracle-all"
          echo "Refresh golden: scripts/refresh_guest_oracle_expected.sh"
