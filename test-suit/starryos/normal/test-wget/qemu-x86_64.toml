args = [
    "-nographic",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/target/rootfs/rootfs-x86_64-alpine.img",
    "-device", "virtio-net-pci,netdev=net0",
    "-netdev", "user,id=net0",
]
uefi = false
to_bin = false
shell_prefix = "root@starry:"
# dl-cdn.alpinelinux.org is the official Alpine Fastly CDN: accepts any User-Agent,
# has IPv4 globally, and does not redirect to IPv6-only servers.
shell_init_cmd = "wget -T 30 http://dl-cdn.alpinelinux.org/alpine/v3.23/main/riscv64/APKINDEX.tar.gz -O /dev/null && echo 'TEST PASSED' || echo 'TEST FAILED'"
success_regex = ["(?m)^TEST PASSED\\s*$"]
fail_regex = ['(?i)\bpanic(?:ked)?\b', '(?m)^TEST FAILED']
timeout = 90
