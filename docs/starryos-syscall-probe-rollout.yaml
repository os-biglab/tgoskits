schema_version: 1
description: Planned Linux syscall contract probes (batches). Matrix uses parity not_applicable until
  promoted.
done_partial_reference:
- clock_gettime
- close
- dup
- execve
- fcntl
- futex
- getcwd
- ioctl
- lseek
- openat
- pipe2
- ppoll
- read
- unlink
- wait4
- write
batch_order_hint:
- B07-fs-stat
- B08-vfs-special
- B09-task-ops
- B10-task-mgmt
- B11-task-sched
- B12-task-info
- B13-signal
- B14-sys
- B15-time
- B16-sync
- B17-ipc
- B18-net
- B19-stubs
