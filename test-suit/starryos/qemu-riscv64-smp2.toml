# Same as qemu-riscv64.toml but request 2 CPUs (SMP smoke for syscall probes).
args = [
    "-nographic",
    "-cpu",
    "rv64",
    "-smp",
    "2",
    "-device",
    "virtio-blk-pci,drive=disk0",
    "-drive",
    "id=disk0,if=none,format=raw,file=${workspace}/target/riscv64gc-unknown-none-elf/rootfs-riscv64.img",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0",
]
uefi = false
to_bin = true
shell_prefix = "starry:~#"
shell_init_cmd = "pwd && echo 'All tests passed!'"
success_regex = ["^All tests passed!$"]
fail_regex = ['(?i)\bpanic(?:ked)?\b']
timeout = 5
