[target.'cfg(not(any(windows, unix)))']
runner = "cargo osrun"

[alias]
build = "build --config .cargo/config-app.toml  -Z unstable-options -Z build-std=core,alloc"
run = "run --config .cargo/config-app.toml  -Z unstable-options -Z build-std=core,alloc"
test = "test --config .cargo/config-test.toml  -Z unstable-options -Z build-std=core,alloc"

run-aarch64 = "run --config .cargo/config-app.toml  -Z unstable-options -Z build-std=core,alloc --target aarch64-unknown-none-softfloat"
run-la64 = "run --config .cargo/config-app.toml  -Z unstable-options -Z build-std=core,alloc --target loongarch64-unknown-none-softfloat"
