id: arceos-axtask-dedicated
title: ArceOS 任务与同步专属题
track: arceos
phase: pilot
difficulty: L2
mode: dedicated_challenge
tags:
- systems-first
- hybrid
baseline_ref: next
judge_profile: arceos-riscv64
summary: 验证 QEMU 级题目的入门门槛与日志可读性。
pilot_metadata:
  expected_time_minutes: 120
  competition_goal: 预赛核心题
allowed_paths:
- os/arceos/modules/axtask
- os/arceos/modules/axsync
- test-suit/arceos/rust/task
forbidden_paths:
- docs/bug-contest
- .github
- container
- scripts/repo
focus_components:
- axtask
- axsync
focus_harnesses:
- arceos-parallel
- arceos-priority
- arceos-wait-queue
visible_commands:
- cargo arceos test qemu --target riscv64gc-unknown-none-elf
hidden_commands:
- 'hidden-timing: 补不同调度时序与中断窗口'
- 'hidden-regression: 验证相邻模块没有被修坏'
- 'hidden-integration: 验证 test-suit 与模块接线链路'
quality_gates:
- cargo fmt --all -- --check
- cargo xtask clippy
offline_assets:
- test-suit/arceos/*
submission:
  required:
  - patch.diff
  - regression-test-or-repro
  - root-cause-report.md
  - impact-analysis.md
  optional:
  - crash-input.bin
  - security-analysis.md
review:
  manual_review_required: true
  minimum_reviewers: 2
  anti_cheat_checks:
  - 检查是否只对 visible tests 做硬编码补丁
  - 检查是否绕过真实逻辑或删除错误路径
  - 检查回归测试是否真正覆盖根因
