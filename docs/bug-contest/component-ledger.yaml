season: 2026-s1
owner: tgoskits-bug-contest
source_of_truth:
  - docs/components.md
  - docs/build-system.md
  - scripts/test/std_crates.csv
selection_rules:
  audit_bundle:
    description: 将 3-5 个小而基础的组件捆成一个审计包，要求选手在受限路径内找出 1-2 个真实 bug 并提交修复与回归测试。
    best_for:
      - host 可直接评测的基础 crate
      - 难度入门但知识点相近的组件
  dedicated_challenge:
    description: 对单个高价值组件或单条系统链路单独出题，提供更完整的复现和判题入口。
    best_for:
      - 复用广、影响大或需要完整上下文的组件
      - 需要独立答辩或维护者复审的题目
  final_only:
    description: 只放到决赛或高阶专题赛，通常依赖 QEMU、rootfs、guest 镜像或复杂配置。
    best_for:
      - StarryOS 深水区
      - Axvisor 与虚拟化边界题
judge_profiles:
  host-standard:
    phase:
      - warmup
      - preliminary
    base_commands:
      - cargo test -p <crate>
      - cargo fmt --all -- --check
      - cargo xtask clippy
    notes:
      - 优先选择已进入 scripts/test/std_crates.csv 的包
      - 允许为单题增加隐藏测试，但不要改变官方镜像
  arceos-riscv64:
    phase:
      - warmup
      - preliminary
      - final
    base_commands:
      - cargo arceos test qemu --target riscv64gc-unknown-none-elf
    notes:
      - 统一使用 riscv64，避免多架构放大维护成本
      - 优先复用 test-suit/arceos 现有测试包
  starry-riscv64:
    phase:
      - preliminary
      - final
    base_commands:
      - cargo starry test qemu --target riscv64
    notes:
      - rootfs 必须预置在官方镜像或比赛挂载卷中
      - 只在主办方可控环境下启用隐藏测试
  axvisor-aarch64:
    phase:
      - final
    base_commands:
      - cargo axvisor test qemu --target aarch64
    notes:
      - guest 镜像、vmconfigs 与 qemu 配置必须离线预置
      - 不允许选手比赛期间联网拉取 guest 资源
  maintainer-review:
    phase:
      - preliminary
      - final
    base_commands:
      - 平台接收私密披露报告、补丁与回归测试
    notes:
      - 仅用于开放披露赛道
      - 由私密披露小组和对应赛道负责人共同复核
