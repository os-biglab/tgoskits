args = [
    "-nographic",
    "-m",
    "512M",
    "-device",
    "virtio-blk-pci,drive=disk0",
    "-drive",
    "id=disk0,if=none,format=raw,file=${workspace}/target/rootfs/rootfs-x86_64-alpine.img",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0",
    "-debugcon",
    "file:/tmp/debugcon.log",
]
# kernel warn/error logs are mirrored to /tmp/debugcon.log (no ANSI, via port 0xE9)
# run:  tail -f /tmp/debugcon.log   on the host while QEMU is running
uefi = false
to_bin = false
shell_prefix = "root@starry:"
shell_init_cmd = "jcode --version && echo 'JCODE_INSTALLED_OK'"
success_regex = ["(?m)^JCODE_INSTALLED_OK\\s*$"]
fail_regex = ['(?i)\bpanic(?:ked)?\b', "(?m)^/bin/sh:.*not found"]
timeout = 30
